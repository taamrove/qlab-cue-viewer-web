server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed asset filenames (Vite emits /assets/*-<hash>.{js,css}) — never
  # change for a given hash, so we can let browsers cache them forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html must never be cached, otherwise after a deploy people see the
  # old shell pointing at deleted hashed assets and get a blank page.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }
}
