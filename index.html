<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QLab Cue Viewer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- ─── Landing page ─────────────────────────────────────────────── -->
    <main id="landing" class="landing" hidden>
      <div class="landing-card">
        <h1 class="landing-title">QLab Cue Viewer</h1>
        <p class="landing-sub">Enter the show code.</p>

        <form id="connect-form" class="connect-form" autocomplete="off">
          <input id="code-input" class="code-input" type="text" required autofocus
                 placeholder="show code"
                 autocapitalize="off" autocorrect="off" spellcheck="false">
          <!-- Password field is hidden by default; only revealed when the relay
               rejects an unauthenticated connection. Keeps the happy path to
               a single input + button. -->
          <label id="pass-row" class="field" hidden>
            <span>Password</span>
            <input id="pass-input" type="password" placeholder="password">
          </label>
          <div id="connect-error" class="connect-error" hidden></div>
          <button type="submit" class="connect-btn">Connect</button>
        </form>

        <section id="recent-section" class="recent" hidden>
          <h2 class="recent-title">Recent shows</h2>
          <ul id="recent-list" class="recent-list"></ul>
        </section>
      </div>
    </main>

    <!-- ─── Timeline (the existing viewer) ───────────────────────────── -->
    <header id="topbar" class="topbar" hidden>
      <button id="back-btn" class="back-btn" title="Switch session" aria-label="Switch session">◀</button>
      <div class="title">
        <div id="group-path" class="group-path"></div>
        <div class="ph-row">
          <span id="playhead-number" class="ph-number"></span>
          <span id="playhead-name" class="ph-name">—</span>
        </div>
      </div>
      <div class="meta">
        <span id="ts" class="ts"></span>
        <span id="status" class="status disconnected">connecting…</span>
      </div>
    </header>

    <main id="timeline" class="timeline" hidden>
      <div id="ruler" class="ruler"></div>
      <div id="lanes" class="lanes"></div>
      <div id="empty" class="empty">waiting for cues…</div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
